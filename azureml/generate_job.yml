$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
display_name: cellflux-generate-bbbc021
description: Generate synthetic BBBC021 images from a pretrained CellFlux checkpoint.

# Repo root is uploaded as the job's code snapshot.
code: ..

# Data + checkpoint are MOUNTED at runtime paths; we hand those paths to
# generate.py via the --image_path / --data_index_path / --embedding_path / --resume
# overrides (these win over the YAML config).
inputs:
  data:
    type: uri_folder
    mode: ro_mount
    path: azureml:cellflux-bbbc021@latest
  ckpt:
    type: uri_folder
    mode: ro_mount
    path: azureml:cellflux-bbbc021-ckpt@latest

outputs:
  results:
    type: uri_folder
    mode: rw_mount

# NOTE: adjust the sub-paths below (metadata/..., embeddings/...) to match how the
# data is laid out inside your blob folder. The bbbc021 image tree itself is the
# `data` mount root.
command: >-
  python generate.py
  --dataset bbbc021 --config bbbc021_all
  --image_path ${{inputs.data}}
  --data_index_path ${{inputs.data}}/metadata/bbbc021_df_all.csv
  --embedding_path ${{inputs.data}}/embeddings/emb_fp.csv
  --resume ${{inputs.ckpt}}/checkpoint.pth
  --output_dir ${{outputs.results}}
  --batch_size 16 --fid_samples 256
  --use_ema --edm_schedule --skewed_timesteps
  --ode_method heun2 --ode_options '{"nfe": 50}'
  --use_initial 2 --noise_level 1.0 --cfg_scale 0.0
  --compute_fid --save_fid_samples

environment: azureml:cellflux-env@latest

# Create this GPU cluster first (see azureml/README.md), e.g. a single T4:
compute: azureml:gpu-t4
